<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Application Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Job Application Tracker</h1>

<form id="jobForm">
  <input type="text" id="company" placeholder="Company" required>
  <input type="text" id="role" placeholder="Role" required>
  <input type="date" id="deadline" required>

  <select id="status">
    <option>Applied</option>
    <option>Interview</option>
    <option>Offer</option>
    <option>Rejected</option>
  </select>

  <button type="submit">Add Job</button>
</form>

<input type="text" id="search" placeholder="Search...">

<table>
  <thead>
    <tr>
      <th class="sortable" data-key="company" data-label="Company" onclick="sortTable('company')">Company ⇅</th>
      <th class="sortable" data-key="role" data-label="Role" onclick="sortTable('role')">Role ⇅</th>
      <th class="sortable" data-key="status" data-label="Status" onclick="sortTable('status')">Status ⇅</th>
      <th class="sortable" data-key="deadline" data-label="Deadline" onclick="sortTable('deadline')">Deadline ⇅</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="jobList"></tbody>
</table>

<script src="script.js"></script>
</body>
</html>
