<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Application Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Job Application Tracker</h1>

<form id="jobForm">
  <input type="text" id="company" placeholder="Company" required>
  <input type="text" id="role" placeholder="Role" required>
  <input type="date" id="applicationdate" required>
  <input type="url" id="link" placeholder="Job Link (optional)">
  
  <select id="status">
    <option>Applied</option>
    <option>Interview</option>
    <option>Offer</option>
    <option>Rejected</option>
  </select>

  <button type="submit">Add Job</button>
</form>

<!-- Search bar with autocomplete/typeahead suggestions -->
<div style="position: relative; width: 100%;">
  <input type="text" id="search" placeholder="Search...">
  <div id="suggestions" class="suggestions"></div>
</div>

<table>
  <thead>
    <tr>
      <th class="sortable" data-key="company" data-label="Company" onclick="sortTable('company')">
        Company ⇅ <button class="filter-btn" onclick="toggleFilter(event, 'company')">▼</button>
      </th>
      <th class="sortable" data-key="role" data-label="Role" onclick="sortTable('role')">
        Role ⇅ <button class="filter-btn" onclick="toggleFilter(event, 'role')">▼</button>
      </th>
      <th class="sortable" data-key="status" data-label="Status" onclick="sortTable('status')">
        Status ⇅ <button class="filter-btn" onclick="toggleFilter(event, 'status')">▼</button>
      </th>
      <th class="sortable" data-key="applicationdate" data-label="Date" onclick="sortTable('applicationdate')">
        Date ⇅ <button class="filter-btn" onclick="toggleFilter(event, 'applicationdate')">▼</button>
      </th>
      <th class="sortable" data-key="link" data-label="Link" onclick="sortTable('link')">
        Link ⇅ <button class="filter-btn" onclick="toggleFilter(event, 'link')">▼</button>
      </th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="jobList"></tbody>
</table>

<!-- Container for filter dropdowns -->
<div id="filterMenu" class="filter-menu"></div>

<script src="script.js"></script>
</body>
</html>
